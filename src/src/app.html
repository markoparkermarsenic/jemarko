<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />

		<!-- Preconnect to Google Fonts origin so the connection is warm -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

		<!-- Load Google Fonts non-blocking: media="print" flips to "all" on load -->
		<link
			rel="stylesheet"
			href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
			media="print"
			onload="this.media='all'"
		/>
		<!-- Fallback for no-JS -->
		<noscript>
			<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" />
		</noscript>

		<!-- Preload the two custom fonts that are used on the critical path -->
		<link rel="preload" href="/Coustard-Regular.ttf" as="font" type="font/ttf" crossorigin />
		<link rel="preload" href="/Mimko-Regular.ttf" as="font" type="font/ttf" crossorigin />

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
